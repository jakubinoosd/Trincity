<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>trincity | Premium & Streetwear</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        /* CSS PREMENNÉ */
        :root {
            --camo-bg: #0d110f; /* Veľmi tmavý základ */
            --pink-neon: #ff2a85; /* Tvoja ružová */
            --purple-glow: #8a2be2; /* Fialová z tvojej fotky pre podsvietenie */
            --text-light: #f5f5f5;
            --card-bg: rgba(255, 255, 255, 0.03);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--camo-bg);
            /* Jemný dark camo pattern s textúrou */
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(35, 45, 30, 0.3) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(50, 40, 45, 0.3) 0%, transparent 40%),
                url('https://www.transparenttextures.com/patterns/black-scales.png');
            color: var(--text-light);
            overflow-x: hidden;
        }

        a { text-decoration: none; color: inherit; }

        /* 1. HEADER & MOBILNÉ MENU */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5vw;
            background: rgba(13, 17, 15, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 42, 133, 0.2);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-family: 'Permanent Marker', cursive;
            font-size: 2.5rem;
            color: var(--pink-neon);
            text-transform: lowercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 0px #000, 0 0 15px rgba(255, 42, 133, 0.5);
            transform: rotate(-2deg);
            transition: 0.3s;
            position: relative;
            z-index: 1001; /* Aby bolo nad mobilným menu */
        }

        .nav-links {
            display: flex;
            gap: 25px;
        }

        .nav-links a {
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .nav-links a:hover { color: var(--pink-neon); }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 1001;
        }

        .cart-btn {
            background: var(--pink-neon);
            color: white;
            border: none;
            padding: 10px 20px;
            font-weight: 800;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 42, 133, 0.4);
            transition: 0.2s;
        }

        .cart-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(255, 42, 133, 0.6);
        }

        /* Hamburger Ikona (skrytá na PC) */
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            background: none;
            border: none;
        }

        .hamburger span {
            width: 25px; height: 3px;
            background-color: var(--text-light);
            border-radius: 3px;
            transition: 0.3s;
        }

        /* 2. HERO SEKCIJA */
        .hero {
            margin-top: 80px;
            padding: 60px 5vw;
            text-align: center;
        }

        .hero h1 {
            font-size: clamp(2rem, 5vw, 4rem);
            margin-bottom: 10px;
            line-height: 1.2;
        }

        .hero p {
            color: #aaa;
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        /* 3. PRODUKTY S GLOW EFEKTOM (Podľa fotky) */
        .products {
            padding: 20px 5vw 80px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 30px;
        }

        .product-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: 0.3s;
        }

        .product-card:hover {
            border-color: rgba(255, 42, 133, 0.3);
            transform: translateY(-5px);
        }

        /* Glow efekt z tvojej fotky */
        .img-container {
            position: relative;
            width: 100%;
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        .img-container::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 70%; height: 70%;
            background: radial-gradient(circle, var(--purple-glow) 0%, var(--pink-neon) 40%, transparent 70%);
            filter: blur(40px);
            z-index: 0;
            opacity: 0.7;
            transition: 0.3s;
        }

        .product-card:hover .img-container::before { opacity: 1; filter: blur(50px); }

        .img-container img {
            max-height: 90%;
            max-width: 90%;
            object-fit: contain;
            position: relative;
            z-index: 1;
            /* Na demonštráciu pridáme drop-shadow na PNGčkam */
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5)); 
        }

        .sale-badge {
            position: absolute;
            top: 15px; left: 15px;
            background: var(--pink-neon);
            color: white;
            font-size: 0.8rem;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 20px;
            z-index: 2;
        }

        .product-card h3 { font-size: 1.1rem; margin-bottom: 5px; }
        
        .price {
            margin-bottom: 15px;
            font-weight: 600;
        }
        
        .old-price {
            text-decoration: line-through;
            color: #777;
            font-size: 0.9rem;
            margin-right: 10px;
        }

        .add-btn {
            background: transparent;
            color: var(--text-light);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 0;
            width: 100%;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .add-btn:hover {
            background: var(--text-light);
            color: var(--camo-bg);
        }

        /* 4. PLATOBNÁ BRÁNA (MODAL) */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .checkout-box {
            background: #151a17;
            border: 1px solid var(--pink-neon);
            box-shadow: 0 0 30px rgba(255, 42, 133, 0.2);
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
            padding: 30px;
            position: relative;
            transform: translateY(20px);
            transition: 0.3s;
        }

        .modal-overlay.active .checkout-box { transform: translateY(0); }

        .close-modal {
            position: absolute;
            top: 15px; right: 20px;
            font-size: 1.5rem;
            color: #aaa;
            cursor: pointer;
        }

        .checkout-box h2 {
            margin-bottom: 20px;
            font-family: 'Permanent Marker', cursive;
            color: var(--pink-neon);
        }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.85rem; color: #aaa; margin-bottom: 5px; }
        .form-group input {
            width: 100%; padding: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px;
            color: white;
            outline: none;
        }
        .form-group input:focus { border-color: var(--pink-neon); }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .pay-btn {
            width: 100%; padding: 15px;
            background: var(--pink-neon);
            color: white; border: none; border-radius: 6px;
            font-size: 1.1rem; font-weight: bold;
            cursor: pointer; margin-top: 10px;
            transition: 0.2s;
        }
        .pay-btn:hover { background: #ff107a; }

        /* RESPONZIVITA (Mobil) */
        @media (max-width: 768px) {
            .hamburger { display: flex; }
            
            .nav-links {
                position: fixed;
                top: 0; right: -100%;
                width: 70vw; height: 100vh;
                background: #0d110f;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                border-left: 2px solid var(--pink-neon);
                transition: 0.3s;
            }

            .nav-links.active { right: 0; }
            
            .header-actions {
                margin-right: 15px; /* Priestor pre menu */
            }
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">trincity</a>
        
        <nav class="nav-links" id="nav-menu">
            <a href="#">Všetko</a>
            <a href="#">Streetwear</a>
            <a href="#">Premium Knits</a>
            <a href="#">Sale</a>
        </nav>

        <div class="header-actions">
            <button class="cart-btn" onclick="openCheckout()">Stash (<span id="cart-count">0</span>)</button>
            <button class="hamburger" onclick="toggleMenu()">
                <span></span><span></span><span></span>
            </button>
        </div>
    </header>

    <section class="hero">
        <h1>STREET MEETS PREP</h1>
        <p>Od surového streetwearu až po luxusné pleteniny. Vyber si svoj vibe.</p>
    </section>

    <section class="products">
        <div class="grid">
            
            <div class="product-card">
                <div class="sale-badge">SALE</div>
                <div class="img-container">
                    <img src="https://cdn.pixabay.com/photo/2016/11/29/01/34/man-1866574_1280.jpg" style="border-radius: 8px;" alt="Hoodie">
                </div>
                <h3>Essence Hoodie</h3>
                <div class="price"><span class="old-price">110.00 €</span> 79.99 €</div>
                <button class="add-btn" onclick="addToCart()">Add to cart</button>
            </div>

            <div class="product-card">
                <div class="img-container">
                    <img src="https://images.unsplash.com/photo-1620799140188-3b2a02fd9a77?auto=format&fit=crop&w=500&q=80" style="mix-blend-mode: screen; border-radius: 8px;" alt="Knit Sweater">
                </div>
                <h3>Aurelian Knit Sweater</h3>
                <div class="price">129.00 €</div>
                <button class="add-btn" onclick="addToCart()">Add to cart</button>
            </div>

            <div class="product-card">
                <div class="sale-badge">SALE</div>
                <div class="img-container">
                    <img src="https://images.unsplash.com/photo-1618354691373-d851c5c3a990?auto=format&fit=crop&w=500&q=80" style="border-radius: 8px;" alt="Core Knit">
                </div>
                <h3>Virex Core Knit</h3>
                <div class="price"><span class="old-price">95.00 €</span> 85.99 €</div>
                <button class="add-btn" onclick="addToCart()">Add to cart</button>
            </div>

            <div class="product-card">
                <div class="img-container">
                    <img src="https://images.unsplash.com/photo-1581655353564-df123a1eb820?auto=format&fit=crop&w=500&q=80" style="border-radius: 8px;" alt="Polo">
                </div>
                <h3>Classic Polo Shirt</h3>
                <div class="price">65.00 €</div>
                <button class="add-btn" onclick="addToCart()">Add to cart</button>
            </div>

        </div>
    </section>

    <div class="modal-overlay" id="checkout-modal">
        <div class="checkout-box">
            <span class="close-modal" onclick="closeCheckout()">&times;</span>
            <h2>SECURE CHECKOUT</h2>
            
            <form id="payment-form" onsubmit="processPayment(event)">
                <div class="form-group">
                    <label>Meno na karte</label>
                    <input type="text" placeholder="Jozef Mak" required>
                </div>
                <div class="form-group">
                    <label>Číslo karty</label>
                    <input type="text" placeholder="0000 0000 0000 0000" maxlength="19" required>
                </div>
                <div class="grid-2">
                    <div class="form-group">
                        <label>Platnosť</label>
                        <input type="text" placeholder="MM/YY" maxlength="5" required>
                    </div>
                    <div class="form-group">
                        <label>CVV</label>
                        <input type="password" placeholder="123" maxlength="3" required>
                    </div>
                </div>
                <button type="submit" class="pay-btn" id="pay-btn-text">ZAPLATIŤ</button>
            </form>
        </div>
    </div>

    <script>
        // Logika košíka
        let cart = 0;
        const cartCountEl = document.getElementById('cart-count');

        function addToCart() {
            cart++;
            cartCountEl.innerText = cart;
            // Vizuálny feedback na tlačidlo košíka
            const btn = document.querySelector('.cart-btn');
            btn.style.transform = 'scale(1.1)';
            btn.style.backgroundColor = 'white';
            btn.style.color = 'var(--pink-neon)';
            setTimeout(() => {
                btn.style.transform = 'scale(1)';
                btn.style.backgroundColor = 'var(--pink-neon)';
                btn.style.color = 'white';
            }, 200);
        }

        // Mobilné menu
        function toggleMenu() {
            const menu = document.getElementById('nav-menu');
            menu.classList.toggle('active');
        }

        // Checkout logika
        const modal = document.getElementById('checkout-modal');

        function openCheckout() {
            if (cart === 0) {
                alert("Tvoj Stash (košík) je prázdny. Pridaj najprv nejaký drop.");
                return;
            }
            modal.classList.add('active');
        }

        function closeCheckout() {
            modal.classList.remove('active');
            document.getElementById('payment-form').reset();
            document.getElementById('pay-btn-text').innerText = "ZAPLATIŤ";
        }

        function processPayment(e) {
            e.preventDefault(); // Zastaví reálne odoslanie formulára
            const btn = document.getElementById('pay-btn-text');
            
            // Simulácia načítania platby
            btn.innerText = "Spracúvam...";
            btn.style.opacity = "0.7";
            
            setTimeout(() => {
                alert("PLATBA ÚSPEŠNÁ! Tvoj drop je na ceste.");
                cart = 0; // Vynulovanie košíka po platbe
                cartCountEl.innerText = cart;
                closeCheckout();
                btn.style.opacity = "1";
            }, 1500); // Trvá to 1.5 sekundy
        }
    </script>

</body>
</html>
